<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Zurich Weather</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#fff;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#111;padding:16px}
    .header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
    .title{font-size:13px;font-weight:600}
    .sub{font-size:11px;color:#999;margin-top:2px}
    .upd{font-size:11px;color:#aaa;white-space:nowrap}
    .section{border:1px solid #eee;border-radius:8px;padding:10px 12px 8px;margin-bottom:8px}
    .sec-title{font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
    .chart-wrap{position:relative;height:170px}
    .chart-wrap.tall{height:210px}
    .legend-note{font-size:10px;color:#aaa;margin-top:4px}
    .error{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;padding:10px;border-radius:8px;font-size:12px;line-height:1.5;white-space:pre-wrap;margin-bottom:8px}
    .foot{font-size:11px;color:#aaa;margin-top:6px}
    a{color:#2563eb;text-decoration:none}
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="title">Zurich 8001 &mdash; 72 h forecast</div>
      <div class="sub">MeteoSwiss ICON &mdash; Temp &middot; Sunshine &middot; Rain &middot; Wind &middot; Pollen</div>
    </div>
    <div class="upd" id="upd"></div>
  </div>
  <div id="err"></div>

  <div class="section">
    <div class="sec-title">Temperature &amp; Sunshine &amp; Precipitation</div>
    <div class="chart-wrap tall"><canvas id="cTS"></canvas></div>
  </div>

  <div class="section">
    <div class="sec-title">Wind &amp; Gusts (B&ouml;en)</div>
    <div class="chart-wrap tall"><canvas id="cWind"></canvas></div>
    <div class="legend-note">
      <span style="color:#22c55e">&lt; 4 km/h</span> &middot;
      <span style="color:#f97316">4 &ndash; 7 km/h</span> &middot;
      <span style="color:#ef4444">&gt; 7 km/h or SW/S/SE</span>
    </div>
  </div>

  <div class="section">
    <div class="sec-title">Pollen (grains / m&#179; per hour)</div>
    <div class="chart-wrap"><canvas id="cP"></canvas></div>
  </div>

  <div class="foot">
    <a href="https://open-meteo.com/en/docs/meteoswiss-api" target="_blank">Open-Meteo MeteoSwiss</a> &middot;
    <a href="https://open-meteo.com/en/docs/air-quality-api" target="_blank">Air Quality API</a>
  </div>

  <script>
  function showErr(msg){
    document.getElementById('err').innerHTML='<div class="error">'+msg+'</div>';
  }
  var sc=document.createElement('script');
  sc.src='https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js';
  sc.onerror=function(){showErr('Failed to load Chart.js from CDN.');};
  sc.onload=function(){run();};
  document.head.appendChild(sc);

  function run(){
   try{
    var LAT=47.3769,LON=8.5417,TZ='Europe/Zurich';

    Chart.defaults.color='#aaa';
    Chart.defaults.borderColor='#eee';
    Chart.defaults.font.size=11;

    var wUrl='https://api.open-meteo.com/v1/forecast'
      +'?latitude='+LAT+'&longitude='+LON
      +'&timezone='+encodeURIComponent(TZ)
      +'&models=meteoswiss_icon_ch1'
      +'&forecast_days=3'
      +'&hourly=temperature_2m,wind_speed_10m,wind_direction_10m,wind_gusts_10m,sunshine_duration,precipitation'
      +'&daily=sunrise,sunset';

    var aqUrl='https://air-quality-api.open-meteo.com/v1/air-quality'
      +'?latitude='+LAT+'&longitude='+LON
      +'&timezone='+encodeURIComponent(TZ)
      +'&forecast_hours=72'
      +'&hourly=alder_pollen,birch_pollen,grass_pollen';

    Promise.all([
      fetch(wUrl,{cache:'no-store'}),
      fetch(aqUrl,{cache:'no-store'})
    ]).then(function(r){
      if(!r[0].ok) throw new Error('Weather HTTP '+r[0].status);
      if(!r[1].ok) throw new Error('Air quality HTTP '+r[1].status);
      return Promise.all([r[0].json(),r[1].json()]);
    }).then(function(data){
      var h=data[0].hourly, daily=data[0].daily||{};
      var aqH=(data[1].hourly)||{};
      var N=Math.min(h.time.length,72);
      var idx=Array.from({length:N},function(_,i){return i;});
      var times=h.time.slice(0,N);

      // Sunrise/sunset arrays (ISO strings per day)
      var sunrises=daily.sunrise||[];
      var sunsets=daily.sunset||[];

      // Build night mask: true if hour is dark
      var isNight=times.map(function(t){
        var dt=new Date(t);
        for(var d=0;d<sunrises.length;d++){
          var sr=new Date(sunrises[d]);
          var ss=new Date(sunsets[d]);
          if(dt>=sr && dt<ss) return false;
        }
        return true;
      });

      // Consistent x-axis: major ticks at 0,6,12,18
      var fmtHM=new Intl.DateTimeFormat('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:TZ});
      var fmtDay=new Intl.DateTimeFormat('en-GB',{weekday:'short',day:'2-digit',month:'2-digit',timeZone:TZ});
      var labels=times.map(function(t){
        var hh=parseInt(t.slice(11,13),10);
        var dt=new Date(t);
        if(hh===0) return fmtDay.format(dt);
        if(hh===6||hh===12||hh===18) return fmtHM.format(dt);
        return '';
      });

      var temps=h.temperature_2m.slice(0,N);
      var winds=h.wind_speed_10m.slice(0,N);
      var wdirs=h.wind_direction_10m.slice(0,N);
      var gusts=(h.wind_gusts_10m||[]).slice(0,N);
      var sun=h.sunshine_duration.slice(0,N).map(function(v){return v!=null&&isFinite(v)?+(v/60).toFixed(1):0;});
      var precip=(h.precipitation||[]).slice(0,N).map(function(v){return v!=null&&isFinite(v)?+v.toFixed(1):0;});
      var alder=(aqH.alder_pollen||[]).slice(0,N);
      var birch=(aqH.birch_pollen||[]).slice(0,N);
      var grass=(aqH.grass_pollen||[]).slice(0,N);

      // Shared x-axis config
      function xAx(){
        return {
          grid:{color:function(ctx){
            var hh=parseInt(times[ctx.index]&&times[ctx.index].slice(11,13)||'99',10);
            return (hh===0||hh===6||hh===12||hh===18)?'#ddd':'#f4f4f4';
          }},
          border:{color:'#e0e0e0'},
          ticks:{maxRotation:0,autoSkip:false,color:'#bbb',font:{size:10},
            callback:function(_,i){return labels[i]||null;}}
        };
      }

      // --- Night shading plugin ---
      var nightPlugin={
        id:'nightShade',
        beforeDraw:function(chart){
          var ca=chart.chartArea;
          if(!ca) return;
          var ctx=chart.ctx, xScale=chart.scales.x;
          ctx.save();
          ctx.fillStyle='rgba(0,0,0,0.03)';
          for(var i=0;i<isNight.length;i++){
            if(!isNight[i]) continue;
            var x0=xScale.getPixelForValue(i)-((xScale.getPixelForValue(1)-xScale.getPixelForValue(0))/2);
            var x1=x0+(xScale.getPixelForValue(1)-xScale.getPixelForValue(0));
            ctx.fillRect(x0,ca.top,x1-x0,ca.bottom-ca.top);
          }
          ctx.restore();
        }
      };

      // --- Wind zone gradient plugin ---
      var windZonePlugin={
        id:'windZones',
        beforeDraw:function(chart){
          var ca=chart.chartArea;
          if(!ca) return;
          var yScale=chart.scales.y;
          if(!yScale) return;
          var ctx=chart.ctx;
          var zones=[
            {from:0,to:4,color:'rgba(34,197,94,0.08)'},
            {from:4,to:7,color:'rgba(249,115,22,0.08)'},
            {from:7,to:25,color:'rgba(239,68,68,0.08)'}
          ];
          ctx.save();
          for(var z=0;z<zones.length;z++){
            var top=yScale.getPixelForValue(Math.min(zones[z].to,yScale.max));
            var bot=yScale.getPixelForValue(Math.max(zones[z].from,yScale.min));
            if(top>bot){var tmp=top;top=bot;bot=tmp;}
            ctx.fillStyle=zones[z].color;
            ctx.fillRect(ca.left,top,ca.right-ca.left,bot-top);
          }
          ctx.restore();
        }
      };

      // --- Wind arrows plugin (drawn ON TOP of chart area) ---
      var arrowPlugin={
        id:'windArrowsTop',
        afterDraw:function(chart){
          var meta=chart._windMeta;
          if(!meta) return;
          var dirs=meta.dirs,spds=meta.spds;
          var ctx=chart.ctx,xScale=chart.scales.x,ca=chart.chartArea;
          ctx.save();
          for(var i=0;i<dirs.length;i+=3){
            var dir=dirs[i],spd=spds[i];
            if(!isFinite(dir)||!isFinite(spd)) continue;
            var x=xScale.getPixelForValue(i);
            var y=ca.top+12;
            var south=(isFinite(dir)&&dir>=135&&dir<=225);
            var rad=((dir+180)%360-90)*Math.PI/180;
            var len=7+Math.min(spd/40,1)*7;
            var dx=Math.cos(rad)*len,dy=Math.sin(rad)*len;
            ctx.strokeStyle=south?'#ef4444':'#22c55e';
            ctx.globalAlpha=0.85;
            ctx.lineWidth=1.6;
            ctx.lineCap='round';
            ctx.lineJoin='round';
            ctx.beginPath();
            ctx.moveTo(x-dx*0.5,y-dy*0.5);
            ctx.lineTo(x+dx*0.5,y+dy*0.5);
            ctx.stroke();
            // arrowhead
            var HL=5,HA=0.5;
            var ex=x+dx*0.5,ey=y+dy*0.5;
            ctx.beginPath();
            ctx.moveTo(ex,ey);
            ctx.lineTo(ex-HL*Math.cos(rad-HA),ey-HL*Math.sin(rad-HA));
            ctx.moveTo(ex,ey);
            ctx.lineTo(ex-HL*Math.cos(rad+HA),ey-HL*Math.sin(rad+HA));
            ctx.stroke();
          }
          ctx.globalAlpha=1;
          ctx.restore();
        }
      };

      // --- Wind color logic ---
      function isSoutherly(dir){
        return isFinite(dir)&&dir>=135&&dir<=225;
      }
      function windColor(spd,dir){
        if(!isFinite(spd)) return '#ddd';
        if(spd<4) return '#22c55e';
        if(spd<=7) return isSoutherly(dir)?'#ef4444':'#f97316';
        return '#ef4444';
      }
      var windBarColors=winds.map(function(spd,i){return windColor(spd,wdirs[i]);});

      // =====================
      // CHART 1: Temp + Sunshine + Precipitation
      // =====================
      new Chart(document.getElementById('cTS').getContext('2d'),{
        type:'bar',
        plugins:[nightPlugin],
        data:{
          labels:idx,
          datasets:[
            {label:'Sunshine min/h',type:'bar',data:sun,yAxisID:'ySun',
              backgroundColor:'rgba(250,204,21,0.28)',borderWidth:0,borderRadius:1,order:3},
            {label:'Precip mm',type:'bar',data:precip,yAxisID:'yRain',
              backgroundColor:'rgba(59,130,246,0.5)',borderWidth:0,borderRadius:2,order:2},
            {label:'Temp \u00b0C',type:'line',data:temps,yAxisID:'yT',
              borderColor:'#f97316',backgroundColor:'rgba(249,115,22,0.05)',
              borderWidth:2,pointRadius:0,tension:0.35,fill:true,order:1}
          ]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          interaction:{mode:'index',intersect:false},
          plugins:{
            legend:{position:'top',align:'end',
              labels:{boxWidth:10,padding:8,font:{size:10},color:'#555'}},
            tooltip:{callbacks:{label:function(ctx){
              var v=ctx.parsed.y;if(v==null||!isFinite(v)) return '';
              if(ctx.datasetIndex===0) return ' '+v.toFixed(0)+' min sun';
              if(ctx.datasetIndex===1) return ' '+v.toFixed(1)+' mm rain';
              return ' '+v.toFixed(1)+'\u00b0C';
            }}}
          },
          scales:{
            x:xAx(),
            yT:{position:'left',grid:{color:'#f4f4f4'},border:{color:'#e0e0e0'},
              ticks:{callback:function(v){return v+'\u00b0';},color:'#f97316',font:{size:10}}},
            ySun:{display:false,min:0,max:60},
            yRain:{position:'right',min:0,grid:{drawOnChartArea:false},border:{color:'#e0e0e0'},
              ticks:{callback:function(v){return v+' mm';},color:'#3b82f6',font:{size:10}}}
          }
        }
      });

      // =====================
      // CHART 2: Wind bars + Gust line + zones + arrows on top
      // =====================
      var cW=new Chart(document.getElementById('cWind').getContext('2d'),{
        type:'bar',
        plugins:[nightPlugin,windZonePlugin,arrowPlugin],
        data:{
          labels:idx,
          datasets:[
            {label:'Gusts (B\u00f6en)',type:'line',data:gusts,
              borderColor:'rgba(120,120,120,0.45)',backgroundColor:'transparent',
              borderWidth:1.5,pointRadius:0,tension:0.3,borderDash:[4,2],order:1},
            {label:'Wind km/h',type:'bar',data:winds,
              backgroundColor:windBarColors,borderWidth:0,borderRadius:2,order:2}
          ]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          layout:{padding:{top:20}},
          interaction:{mode:'index',intersect:false},
          plugins:{
            legend:{position:'top',align:'end',
              labels:{boxWidth:10,padding:8,font:{size:10},color:'#555'}},
            tooltip:{callbacks:{label:function(ctx){
              var v=ctx.parsed.y;
              var dir=wdirs[ctx.dataIndex];
              var dl=isFinite(dir)?Math.round(dir)+'\u00b0':'?';
              if(ctx.datasetIndex===0)
                return ' Gust: '+(v!=null&&isFinite(v)?v.toFixed(0):'\u2013')+' km/h';
              return ' Wind: '+(v!=null?v.toFixed(0):'\u2013')+' km/h ('+dl+')';
            }}}
          },
          scales:{
            x:xAx(),
            y:{min:0,max:25,
              grid:{color:'#f4f4f4'},border:{color:'#e0e0e0'},
              ticks:{callback:function(v){return v+' km/h';},font:{size:10}}}
          }
        }
      });
      cW._windMeta={dirs:wdirs,spds:winds};

      // =====================
      // CHART 3: Pollen
      // =====================
      new Chart(document.getElementById('cP').getContext('2d'),{
        type:'line',
        plugins:[nightPlugin],
        data:{
          labels:idx,
          datasets:[
            {label:'Alder',data:alder,borderColor:'#16a34a',
              backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:0.3},
            {label:'Birch',data:birch,borderColor:'#9333ea',
              backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:0.3},
            {label:'Grass',data:grass,borderColor:'#ca8a04',
              backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:0.3}
          ]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{
            legend:{position:'top',align:'end',
              labels:{boxWidth:10,padding:10,font:{size:11},color:'#555'}},
            tooltip:{callbacks:{label:function(ctx){
              return ' '+ctx.dataset.label+': '+(isFinite(ctx.parsed.y)?ctx.parsed.y.toFixed(0):'\u2013')+' /m\u00b3';
            }}}
          },
          scales:{
            x:xAx(),
            y:{min:0,grid:{color:'#f4f4f4'},border:{color:'#e0e0e0'},ticks:{font:{size:10}}}
          }
        }
      });

      document.getElementById('upd').textContent=
        'Updated '+new Date().toLocaleString('en-GB',{hour:'2-digit',minute:'2-digit'});

    }).catch(function(err){
      showErr('Could not load data.\n\n'+err);
    });
   }catch(err){
    showErr('Script error: '+err);
   }
  }
  </script>
</body>
</html>
