<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zurich Weather (MeteoSwiss ICON)</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: rgba(255,255,255,0.08);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.70);
      --accent: #7dd3fc;
      --border: rgba(255,255,255,0.16);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }
    body {
      margin: 0;
      background: transparent;
      font-family: var(--sans);
      color: var(--text);
    }
    .wrap {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 14px 10px;
      box-sizing: border-box;
      width: 100%;
      max-width: 520px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
    }
    .title {
      font-size: 14px;
      font-weight: 650;
      letter-spacing: 0.2px;
    }
    .subtitle {
      font-size: 12px;
      color: var(--muted);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .day {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      min-height: 96px;
    }
    .dow {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .temp {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .kv {
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
    }
    .kv b { color: var(--text); font-weight: 650; }
    .foot {
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .extras {
      margin-top: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }
    .extra-title {
      font-size: 12px;
      font-weight: 650;
      margin-bottom: 6px;
      color: var(--text);
    }
    .extra-kv {
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
    }
    .extra-kv b { color: var(--text); font-weight: 650; }

    .mono { font-family: var(--mono); }
    .error {
      background: rgba(239,68,68,0.16);
      border: 1px solid rgba(239,68,68,0.35);
      color: rgba(255,255,255,0.92);
      padding: 10px;
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.35;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="top">
      <div>
        <div class="title">Zurich 8001 — next 3 days</div>
        <div class="subtitle">Sunrise/sunset • precip • wind (MeteoSwiss ICON via Open‑Meteo)</div>
      </div>
      <div class="subtitle mono" id="updated"></div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="extras" id="extras"></div>

    <div class="foot">
      <div>Data: <a href="https://open-meteo.com/en/docs/meteoswiss-api" target="_blank" rel="noreferrer">Open‑Meteo (MeteoSwiss ICON)</a></div>
      <div class="mono" id="tz"></div>
    </div>
  </div>

<script>
(async function() {
  // Zurich ~8001 (city center-ish). Adjust if you want a different point.
  const latitude = 47.3769;
  const longitude = 8.5417;
  const timezone = "Europe/Zurich";

  const url = new URL("https://api.open-meteo.com/v1/forecast");
  url.searchParams.set("latitude", latitude);
  url.searchParams.set("longitude", longitude);
  url.searchParams.set("timezone", timezone);

  // WEATHER (daily) — stays compact
  url.searchParams.set("daily", [
    "temperature_2m_max",
    "temperature_2m_min",
    "precipitation_sum",
    "wind_speed_10m_max",
    "wind_gusts_10m_max",
    "sunrise",
    "sunset"
  ].join(","));

  // WEATHER MODEL — MeteoSwiss ICON CH
  // (Open-Meteo uses the model key "meteoswiss_icon_ch1" / "meteoswiss_icon_ch2"; ch1 is the common default.)
  url.searchParams.set("models", "meteoswiss_icon_ch1");
  url.searchParams.set("forecast_days", "3");

  // AIR QUALITY + POLLEN — separate endpoint
  const aqUrl = new URL("https://air-quality-api.open-meteo.com/v1/air-quality");
  aqUrl.searchParams.set("latitude", latitude);
  aqUrl.searchParams.set("longitude", longitude);
  aqUrl.searchParams.set("timezone", timezone);
  // current + hourly pollen (air quality API uses hourly, not daily; we average the first 24h ourselves)
  aqUrl.searchParams.set("current", [
    "pm2_5",
    "pm10",
    "nitrogen_dioxide",
    "ozone",
    "european_aqi"
  ].join(","));
  aqUrl.searchParams.set("hourly", [
    "alder_pollen",
    "birch_pollen",
    "grass_pollen"
  ].join(","));
  aqUrl.searchParams.set("forecast_hours", "72");

  const grid = document.getElementById("grid");
  const updated = document.getElementById("updated");
  const tz = document.getElementById("tz");
  const extras = document.getElementById("extras");

  try {
    const [resW, resAQ] = await Promise.all([
      fetch(url.toString(), { cache: "no-store" }),
      fetch(aqUrl.toString(), { cache: "no-store" })
    ]);

    if (!resW.ok) throw new Error("Weather HTTP " + resW.status);
    if (!resAQ.ok) throw new Error("Air quality HTTP " + resAQ.status);

    const data = await resW.json();
    const aq = await resAQ.json();

    const d = data.daily;
    const times = d.time;

    // Render cards
    const fmtDay = new Intl.DateTimeFormat("en-GB", { weekday: "short", day: "2-digit", month: "2-digit", timeZone: timezone });
    const fmtTime = new Intl.DateTimeFormat("en-GB", { hour: "2-digit", minute: "2-digit", hour12: false, timeZone: timezone });

    grid.innerHTML = "";

    for (let i = 0; i < times.length; i++) {
      const date = new Date(times[i] + "T00:00:00");
      const sunrise = new Date(d.sunrise[i]);
      const sunset = new Date(d.sunset[i]);

      // Pollen: API returns hourly data — take the max over 24h window for this day
      const dailyMax = (arr) => {
        if (!Array.isArray(arr)) return null;
        const slice = arr.slice(i * 24, i * 24 + 24).filter(v => Number.isFinite(v));
        if (slice.length === 0) return null;
        return Math.round(Math.max(...slice));
      };

      const alder = dailyMax(aq.hourly?.alder_pollen);
      const birch = dailyMax(aq.hourly?.birch_pollen);
      const grass = dailyMax(aq.hourly?.grass_pollen);

      const pollenLine = [
        (alder === null ? null : `Alder ${alder}`),
        (birch === null ? null : `Birch ${birch}`),
        (grass === null ? null : `Grass ${grass}`)
      ].filter(Boolean).join(" · ");

      const card = document.createElement("div");
      card.className = "day";
      card.innerHTML = `
        <div class="dow">${fmtDay.format(date)}</div>
        <div class="temp">${Math.round(d.temperature_2m_min[i])}–${Math.round(d.temperature_2m_max[i])}°C</div>
        <div class="kv"><b>Sun</b> ${fmtTime.format(sunrise)}–${fmtTime.format(sunset)}</div>
        <div class="kv"><b>Precip</b> ${Number.isFinite(d.precipitation_sum[i]) ? d.precipitation_sum[i].toFixed(1) : "0.0"} mm</div>
        <div class="kv"><b>Wind</b> ${Math.round(d.wind_speed_10m_max[i])} km/h (gusts ${Math.round(d.wind_gusts_10m_max[i])})</div>
        <div class="kv"><b>Pollen</b> ${pollenLine || "–"}</div>
      `;
      grid.appendChild(card);
    }

    // Current air quality
    const c = aq.current || {};
    const fmt = (x, digits = 0) => Number.isFinite(x) ? x.toFixed(digits) : "–";

    extras.innerHTML = `
      <div class="extra-row">
        <div class="extra-title">Current (Zurich)</div>
        <div class="extra-kv"><b>EU AQI</b> ${fmt(c.european_aqi)} · <b>PM2.5</b> ${fmt(c.pm2_5, 1)} µg/m³ · <b>PM10</b> ${fmt(c.pm10, 1)} µg/m³</div>
        <div class="extra-kv"><b>NO₂</b> ${fmt(c.nitrogen_dioxide, 1)} µg/m³ · <b>O₃</b> ${fmt(c.ozone, 1)} µg/m³</div>
      </div>
    `;

    tz.textContent = timezone;
    updated.textContent = new Date().toLocaleString("en-GB", { hour: "2-digit", minute: "2-digit" });

  } catch (err) {
    grid.innerHTML = `
      <div class="error">
        Could not load widget.\n\n${String(err)}\n\nWeather URL: ${url.toString()}\n\nAir URL: ${aqUrl.toString()}
      </div>
    `;
    extras.innerHTML = "";
    tz.textContent = timezone;
  }
})();
</script>
</body>
</html>
